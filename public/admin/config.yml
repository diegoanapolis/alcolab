backend:
  name: github
  repo: diegoanapolis/alcolab
  branch: main
  base_url: https://alcolab.org
  auth_endpoint: /api/auth

# Onde as imagens dos posts serão salvas
media_folder: "public/images/blog"
public_folder: "/images/blog"

# Desabilitar editorial workflow (simplifica o fluxo)
publish_mode: simple

# Idioma do painel admin
locale: "pt"

collections:
  # ─── Blog PT ───
  - name: "blog-pt"
    label: "Blog (Português)"
    folder: "content/blog/pt"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    editor:
      preview: true
    fields:
      - { label: "Título", name: "title", widget: "string", hint: "Título do post (aparece no Google). Ideal: 50-60 caracteres." }
      - { label: "Descrição SEO", name: "description", widget: "text", hint: "Descrição que aparece no Google. Ideal: 120-160 caracteres." }
      - { label: "Data", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Autor", name: "author", widget: "select", options: ["Diego Mendes de Souza", "Pedro Augusto de Oliveira Morais", "Nayara Ferreira Santos"] }
      - { label: "Imagem de destaque", name: "image", widget: "image", required: true, hint: "Imagem principal do post. Ideal: 1200x630px. Aparece no Google e redes sociais." }
      - { label: "Texto ALT da imagem", name: "imageAlt", widget: "string", hint: "Descreva a imagem com palavras-chave. Ex: 'Seringa de 20mL para triagem de metanol em bebida'" }
      - { label: "Palavras-chave", name: "tags", widget: "list", hint: "Separe por vírgula. Ex: metanol, bebida adulterada, triagem" }
      - { label: "Idioma", name: "locale", widget: "hidden", default: "pt-BR" }
      - { label: "Publicado", name: "published", widget: "boolean", default: false, hint: "Marque para publicar. Desmarcado = rascunho." }
      - { label: "Corpo do artigo", name: "body", widget: "markdown" }

  # ─── Blog EN ───
  - name: "blog-en"
    label: "Blog (English)"
    folder: "content/blog/en"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    editor:
      preview: true
    fields:
      - { label: "Title", name: "title", widget: "string", hint: "Post title (appears on Google). Ideal: 50-60 characters." }
      - { label: "SEO Description", name: "description", widget: "text", hint: "Description shown on Google. Ideal: 120-160 characters." }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Author", name: "author", widget: "select", options: ["Diego Mendes de Souza", "Pedro Augusto de Oliveira Morais", "Nayara Ferreira Santos"] }
      - { label: "Featured image", name: "image", widget: "image", required: true, hint: "Main post image. Ideal: 1200x630px. Shown on Google and social media." }
      - { label: "Image ALT text", name: "imageAlt", widget: "string", hint: "Describe the image with keywords. Ex: '20mL syringe for methanol screening in beverage'" }
      - { label: "Keywords", name: "tags", widget: "list", hint: "Comma separated. Ex: methanol, adulterated beverage, screening" }
      - { label: "Locale", name: "locale", widget: "hidden", default: "en" }
      - { label: "Published", name: "published", widget: "boolean", default: false, hint: "Check to publish. Unchecked = draft." }
      - { label: "Article body", name: "body", widget: "markdown" }
